<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Linear Gradient for Logo outline and paths -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff00c8" />
    </linearGradient>
    <!-- Drop Shadow / Glow filter for tech feel -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glowing Hexagon -->
  <polygon points="100,20 170,60 170,140 100,180 30,140 30,60" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linejoin="round" filter="url(#logoGlow)" />
  
  <!-- Inner combined symbol V and X -->
  <!-- V Shape -->
  <path d="M 65,75 L 100,135 L 135,75" fill="none" stroke="url(#logoGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Left-to-Center crossover line for X -->
  <path d="M 65,135 L 90,113" fill="none" stroke="url(#logoGrad)" stroke-width="12" stroke-linecap="round" />
  <!-- Center-to-Right crossover line for X -->
  <path d="M 110,97 L 135,75" fill="none" stroke="url(#logoGrad)" stroke-width="12" stroke-linecap="round" />
</svg>
